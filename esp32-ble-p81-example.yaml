substitutions:
  name: daly-bms-ble-dl
  device_description: "Monitor a DALY BMS (0x81 protocol) via BLE"
  external_components_source: github://syssi/esphome-daly-bms@poc-dl81

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-daly-bms"
    version: 1.4.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# api:
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret bms0_mac_address
    id: client0

daly_bms_ble:
  - ble_client_id: client0
    id: bms0
    # Use protocol_version: 0x81 for devices responding to the p81 protocol.
    # Use protocol_version: 0xD2 (default) for the standard H/K/M/S series.
    protocol_version: 0x81
    update_interval: 60s
    response_timeout: 5s

binary_sensor:
  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    online_status:
      name: "online status"
    balancing:
      name: "balancing"
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    precharging:
      name: "precharging"

