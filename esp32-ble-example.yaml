substitutions:
  name: daly-bms-ble
  device_description: "Monitor a DALY Battery Management System via BLE"
  external_components_source: github://syssi/esphome-daly-bms@main

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-daly-bms"
    version: 1.3.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret bms0_mac_address
    id: client0

daly_bms_ble:
  - ble_client_id: client0
    id: bms0
    password: 12345678
    status_registers: 62
    update_interval: 10s

binary_sensor:
  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    balancing:
      name: "balancing"
    charging:
      name: "charging"
    discharging:
      name: "discharging"

button:
  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    # Retrieves the BMS settings and prints them in the ESPHome logs
    retrieve_settings:
      name: "retrieve settings"
    # Retrieves the BMS software/hardware version and publishes it to the text sensors
    retrieve_version:
      name: "retrieve version"
    # Restarts the BMS
    restart:
      name: "restart"
    # Shuts down the BMS
    shutdown:
      name: "shutdown"
    # Resets the BMS to the factory settings
    factory_reset:
      name: "factory reset"
    # Resets the BMS current to zero
    reset_current:
      name: "reset current"

