substitutions:
  name: daly-bms-ble
  bms0: "${name} bms0"
  bms1: "${name} bms1"
  device_description: "Monitor a DALY Battery Management System via BLE"
  external_components_source: github://syssi/esphome-daly-bms@main
  bms0_mac_address: !secret bms0_mac_address
  bms1_mac_address: !secret bms1_mac_address

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-daly-bms"
    version: 1.3.0

  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - switch.turn_off: ble_client_switch1
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1

daly_bms_ble:
  - ble_client_id: client0
    id: bms0
    password: 12345678
    status_registers: 62
    update_interval: 10s
  - ble_client_id: client1
    id: bms1
    password: 12345678
    status_registers: 62
    update_interval: 10s

binary_sensor:
  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    balancing:
      name: "balancing"
      device_id: device0
    charging:
      name: "charging"
      device_id: device0
    discharging:
      name: "discharging"
      device_id: device0

  - platform: daly_bms_ble
    daly_bms_ble_id: bms1
    balancing:
      name: "balancing"
      device_id: device1
    charging:
      name: "charging"
      device_id: device1
    discharging:
      name: "discharging"
      device_id: device1

button:
  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    # Retrieves the BMS settings and prints them in the ESPHome logs
    retrieve_settings:
      name: "retrieve settings"
      device_id: device0
    # Restarts the BMS
    restart:
      name: "restart"
      device_id: device0
    # Shuts down the BMS
    shutdown:
      name: "shutdown"
      device_id: device0
    # Resets the BMS to the factory settings
    factory_reset:
      name: "factory reset"
      device_id: device0
    # Resets the BMS current to zero
    reset_current:
      name: "reset current"
      device_id: device0

  - platform: daly_bms_ble
    daly_bms_ble_id: bms1
    retrieve_settings:
      name: "retrieve settings"
      device_id: device1
    restart:
      name: "restart"
      device_id: device1
    shutdown:
      name: "shutdown"
      device_id: device1
    factory_reset:
      name: "factory reset"
      device_id: device1
    reset_current:
      name: "reset current"
      device_id: device1

