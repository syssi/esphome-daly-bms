<<: !include esp32-ble-p81-example.yaml

daly_bms_ble:
  - ble_client_id: client0
    id: bms0
    protocol_version: 0x81
    update_interval: 10s
    response_timeout: 3s

# Frames captured from ESS-DL-BMS (firmware 41_260321_0323).
# send_command() queues the matching outgoing request so that
# on_daly_bms_ble_data() can dispatch by command address.
interval:
  - interval: 10s
    then:
      # RT1: registers 0x0000-0x003F (64 regs)
      # 16 cells ~3.315V, 4 temp sensors at 22°C,
      # 53.0V / -8.9A / SOC 86.4%
      - lambda: |-
          id(bms0).send_command(0x03, 0x0000, 0x40);
          id(bms0).on_daly_bms_ble_data({
            0x51, 0x03, 0x80, 0x0C, 0xF4, 0x0C, 0xF0, 0x0C, 0xF3, 0x0C,
            0xF2, 0x0C, 0xF3, 0x0C, 0xF1, 0x0C, 0xF3, 0x0C, 0xF3, 0x0C,
            0xF0, 0x0C, 0xF3, 0x0C, 0xF3, 0x0C, 0xF4, 0x0C, 0xF3, 0x0C,
            0xF3, 0x0C, 0xF3, 0x0C, 0xF5, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x3E, 0x00, 0x3E, 0x00, 0x3E, 0x00, 0x3E, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x12, 0x74, 0xD7, 0x03,
            0x60, 0x00, 0xB6, 0x00, 0x10, 0x00, 0x04, 0x0C, 0xF5, 0x00,
            0x10, 0x99, 0xEF
          });

      - delay: 1s

      # RT2: registers 0x0041-0x007E (62 regs)
      # Discharging, 271.2Ah remaining, 7 cycles, balancing active,
      # charging+discharging MOS on, max/min bat temp 22°C,
      # MOSFET 24°C, board 30°C, energy 0Wh
      - lambda: |-
          id(bms0).send_command(0x03, 0x0041, 0x3E);
          id(bms0).on_daly_bms_ble_data({
            0x51, 0x03, 0x7C, 0x00, 0x09, 0x00, 0x05, 0x00, 0x3E, 0x00,
            0x04, 0x00, 0x3E, 0x00, 0x01, 0x00, 0x00, 0x00, 0x02, 0x00,
            0x00, 0x00, 0x00, 0x0A, 0x98, 0x00, 0x07, 0x00, 0x07, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x01, 0x00,
            0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x0C, 0xF2, 0x01,
            0xD7, 0x00, 0x00, 0x00, 0x40, 0x00, 0x46, 0x00, 0x00, 0x00,
            0x00, 0xFF, 0xFF, 0x00, 0x00, 0x75, 0x30, 0x1A, 0x06, 0x02,
            0x14, 0x02, 0x21, 0x0B, 0x4B, 0x04, 0x02, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x80, 0x00, 0x00, 0x74, 0xBE, 0x00, 0x11, 0x03,
            0x5F, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x80, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF,
            0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF,
            0xFF, 0x00, 0xFF, 0xFF, 0xFF, 0x00, 0x02, 0xB8, 0xAC
          });

      - delay: 1s

      # Alarm registers 0x00A4-0x00AD (10 regs) — logged as raw hex
      - lambda: |-
          id(bms0).send_command(0x03, 0x00A4, 0x0A);
          id(bms0).on_daly_bms_ble_data({
            0x51, 0x03, 0x14, 0xFF, 0xFF, 0x00, 0x02, 0x05, 0xDC, 0x05,
            0xDC, 0xC0, 0x10, 0x00, 0x02, 0x6F, 0x78, 0x00, 0x01, 0xD3,
            0xC0, 0xFF, 0xFF, 0x1F, 0x37
          });

      - delay: 1s

      # Version registers 0x0178-0x01C1 (74 regs)
      # SW: "41_260321_0323ESS-DL-BMS"  HW: "ESS41_0323"
      - lambda: |-
          id(bms0).send_command(0x03, 0x0178, 0x4A);
          id(bms0).on_daly_bms_ble_data({
            0x51, 0x03, 0x94, 0x34, 0x31, 0x5F, 0x32, 0x36, 0x30, 0x33,
            0x32, 0x31, 0x5F, 0x30, 0x33, 0x32, 0x33, 0x45, 0x53, 0x53,
            0x2D, 0x44, 0x4C, 0x2D, 0x42, 0x4D, 0x53, 0x00, 0x00, 0x00,
            0x00, 0x45, 0x53, 0x53, 0x34, 0x31, 0x5F, 0x30, 0x33, 0x32,
            0x33, 0x00, 0x00, 0x00, 0x00, 0x32, 0x31, 0x30, 0x4C, 0x43,
            0x32, 0x31, 0x30, 0x39, 0x30, 0x30, 0x30, 0x30, 0x35, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x20,
            0x20, 0x20, 0x20, 0x32, 0x30, 0x32, 0x36, 0x30, 0x33, 0x32,
            0x36, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x26, 0x95
          });

      - delay: 1s

      # Balancer switch register 0x00CF (1 reg) — 0xFFFF = ON
      - lambda: |-
          id(bms0).send_command(0x03, 0x00CF, 0x01);
          id(bms0).on_daly_bms_ble_data({
            0x51, 0x03, 0x02, 0xFF, 0xFF, 0x79, 0xF8
          });
